name: Deploy to AWS App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  APP_RUNNER_SERVICE: focuspot

jobs:
  deploy:
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger App Runner deployment
        run: |
          echo "Triggering deployment for service: $APP_RUNNER_SERVICE"

          # Get the service ARN
          SERVICE_ARN=$(aws apprunner list-services \
            --region "$AWS_REGION" \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE'].ServiceArn" \
            --output text 2>/dev/null || echo "")

          if [ -z "$SERVICE_ARN" ]; then
            echo "⚠️  App Runner service '$APP_RUNNER_SERVICE' not found."
            echo "Create it first following DEPLOY-AWS.md, then this workflow will auto-deploy on push."
            exit 0
          fi

          echo "Service ARN: $SERVICE_ARN"
          echo "Starting deployment..."

          aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --region "$AWS_REGION"

          echo "✅ Deployment triggered. Check App Runner console for build progress."

      - name: Lint check
        run: |
          if [ -f package.json ]; then
            npm install -g bun
            bun install
            bun run lint
          fi
