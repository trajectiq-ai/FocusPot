name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: focuspot-rg
  CONTAINER_APP_NAME: focuspot
  IMAGE_NAME: focuspot

jobs:
  build-and-deploy:
    name: Build and Deploy to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker build \
            --build-arg DATABASE_URL="$DATABASE_URL" \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:latest \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:${{ github.sha }} \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Lint check
        run: |
          npm install -g bun
          bun install
          bun run lint

      - name: Health check
        run: |
          sleep 30
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          
          echo "App URL: https://$APP_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL/api/status")
          echo "Health check status: $STATUS"
          
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Health check failed — the app may still be starting up"
          else
            echo "✅ App is healthy!"
          fi
