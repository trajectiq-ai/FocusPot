# FocusPot — Production Docker Compose
# Run: docker compose up -d

services:
  # ===== PostgreSQL Database =====
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: focuspot
      POSTGRES_USER: focuspot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-focuspot_secure_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focuspot -d focuspot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Next.js Web Application =====
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database — uses PostgreSQL in production
      DATABASE_URL: postgresql://focuspot:${POSTGRES_PASSWORD:-focuspot_secure_change_me}@db:5432/focuspot?schema=public
      # Session security — generate with: openssl rand -hex 32
      SESSION_SECRET: ${SESSION_SECRET:-CHANGE_ME_TO_RANDOM_64_CHAR_HEX_STRING}
      # SMTP email (configure for real email delivery)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-FocusPot <noreply@focuspot.io>}
      # Stripe (configure for real payments)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # App URL (for email links)
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://focuspot.example.com}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs

  # ===== Scheduler Mini-Service =====
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["bun", "mini-services/scheduler/index.ts"]
    environment:
      DATABASE_URL: postgresql://focuspot:${POSTGRES_PASSWORD:-focuspot_secure_change_me}@db:5432/focuspot?schema=public
      NODE_ENV: production

  # ===== Caddy Reverse Proxy (HTTPS) =====
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  # ===== Backup Service (daily PostgreSQL dumps) =====
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: focuspot
      PGPASSWORD: ${POSTGRES_PASSWORD:-focuspot_secure_change_me}
      PGDATABASE: focuspot
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
